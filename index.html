<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .hero {
      text-align: center;
      padding: 24px;
    }

    .logo {
      max-width: 280px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px;
      animation: float 2s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      color: #222;
      font-weight: 600;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.02);
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <img src="logo.png" alt="Site logo" class="logo" />
    <h1>Coming Soon</h1>
  </main>
</body>
</html>
